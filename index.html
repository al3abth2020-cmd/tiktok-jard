<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جرد تيك توك</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
    background: #0f1226; color: #fff; padding: 14px; padding-bottom: 175px;
  }
  h1 { text-align: center; font-size: 21px; margin: 4px 0 2px; }
  .hint { text-align: center; color: #9aa0c0; font-size: 12.5px; margin-bottom: 12px; }

  .home { position: absolute; top: 14px; right: 14px; text-decoration: none; color: #9aa0c0; background: #161a38; border: 1px solid #2a3060; border-radius: 12px; padding: 8px 12px; font-size: 13px; font-weight: 700; }
  .home:active { transform: scale(.95); }

  .wrap { max-width: 620px; margin: 0 auto; }

  /* تبويبات الطرق */
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab {
    flex: 1; border: 2px solid #2a3060; background: #161a38; color: #9aa0c0;
    border-radius: 14px; padding: 12px 6px; font-size: 14px; font-weight: 800;
    cursor: pointer; transition: .15s; text-align: center; line-height: 1.4;
  }
  .tab small { display: block; font-size: 10.5px; font-weight: 600; opacity: .8; }
  .tab.active { color: #fff; border-color: #4f8cff; background: linear-gradient(145deg,#23306a,#1a2150); }
  .tab:active { transform: scale(.97); }

  .toolbar { display: flex; gap: 8px; margin-bottom: 10px; }
  .toolbar button { flex: 1; border: none; border-radius: 13px; padding: 13px 8px; font-size: 14.5px; font-weight: 800; cursor: pointer; color: #fff; }
  .btn-copy { background: linear-gradient(145deg,#2bb673,#199e5e); }
  .btn-add  { background: linear-gradient(145deg,#4f8cff,#3a6ddc); }
  .btn-set  { flex: 0 0 52px; background: #2a3060; font-size: 18px; }
  .toolbar button:active { transform: scale(.96); }

  /* الإعدادات */
  .settings { display: none; background: #161a38; border: 1px solid #2a3060; border-radius: 14px; padding: 12px; margin-bottom: 12px; }
  .settings.open { display: block; }
  .settings .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 0; font-size: 13.5px; color: #cfd3ea; }
  .settings .row + .row { border-top: 1px solid #232a52; }
  .settings input { width: 100px; text-align: center; font-size: 15px; font-weight: 700; background: #0f1226; color: #ffd36b; border: 1px solid #2a3060; border-radius: 9px; padding: 7px; direction: ltr; }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 11px; }
  .card {
    background: linear-gradient(145deg, #1d2148, #161a38); border: 2px solid #2a3060;
    border-radius: 17px; padding: 13px 11px 11px; text-align: center; cursor: pointer;
    user-select: none; transition: transform .08s, border-color .2s; position: relative;
  }
  .card:active { transform: scale(.97); border-color: #4f8cff; }

  .name-input { width: 100%; text-align: center; font-size: 15.5px; font-weight: 800; background: transparent; color: #fff; border: none; border-bottom: 1px dashed #3a4080; padding: 4px 0 6px; margin-top: 16px; }
  .name-input:focus { outline: none; border-bottom-color: #4f8cff; }

  .row2 { display: flex; gap: 6px; margin: 8px 0 4px; }
  .field { flex: 1; }
  .field label { display: block; font-size: 10px; color: #9aa0c0; margin-bottom: 3px; }
  .field input { width: 100%; text-align: center; font-size: 15px; font-weight: 800; border: 1px solid #2a3060; border-radius: 8px; padding: 6px 2px; direction: ltr; background: #0f1226; }
  .field .v { color: #ffd36b; }
  .field .p { color: #6be3a3; }

  .sar-each { font-size: 11.5px; color: #9aa0c0; direction: rtl; min-height: 15px; margin-top: 2px; }
  .sar-each b { color: #cfd3ea; direction: ltr; display: inline-block; }
  .fee-note { color: #ffb36b; font-size: 10.5px; }

  .card .count { margin-top: 8px; font-size: 16px; font-weight: 800; background: #4f8cff; color: #fff; border-radius: 11px; padding: 9px 0; }
  .card .subtotal { margin-top: 6px; font-size: 14px; font-weight: 800; color: #6be3a3; direction: rtl; min-height: 18px; }

  .minus, .del { position: absolute; top: 8px; width: 29px; height: 29px; border-radius: 50%; border: none; color: #fff; font-weight: 700; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .minus { left: 8px; background: #ff5d6c; font-size: 19px; }
  .del { right: 8px; background: #5a4060; font-size: 15px; }
  .minus:active, .del:active { transform: scale(.9); }

  .add-card { border: 2px dashed #3a4080; background: transparent; border-radius: 17px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9aa0c0; cursor: pointer; min-height: 130px; font-weight: 700; }
  .add-card:active { transform: scale(.97); }
  .add-card .plus { font-size: 32px; line-height: 1; }

  .totalbar { position: fixed; bottom: 0; right: 0; left: 0; background: #161a38; border-top: 2px solid #2a3060; padding: 11px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .totalbar .grand { font-size: 23px; font-weight: 900; color: #6be3a3; direction: rtl; }
  .totalbar .grand b { direction: ltr; display: inline-block; }
  .totalbar .grand small { font-size: 12px; color: #9aa0c0; font-weight: 600; }
  .totalbar .sub { font-size: 11.5px; color: #9aa0c0; margin-top: 3px; direction: rtl; }
  .totalbar .sub b { direction: ltr; display: inline-block; color: #cfd3ea; }
  .reset { background: #2a3060; color: #fff; border: none; border-radius: 12px; padding: 11px 14px; font-size: 13.5px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .reset:active { transform: scale(.95); }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #199e5e; color: #fff; padding: 12px 22px; border-radius: 30px; font-weight: 700; font-size: 15px; opacity: 0; pointer-events: none; transition: opacity .25s, bottom .25s; z-index: 50; }
  .toast.show { opacity: 1; bottom: 100px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🧮 جرد تيك توك</h1>
  <div class="hint">اختر طريقة الشحن فوق · اضغط على المنتج لزيادة العدد</div>

  <div class="tabs" id="tabs"></div>

  <div class="toolbar">
    <button class="btn-copy" onclick="copyReport()">📋 نسخ التقرير</button>
    <button class="btn-add" onclick="addProduct()">➕ منتج</button>
    <button class="btn-set" onclick="toggleSettings()">⚙️</button>
  </div>

  <div class="settings" id="settings">
    <div class="row"><span>💵 سعر الدولار (ريال)</span><input id="set-usd" type="number" step="0.01" inputmode="decimal"></div>
    <div class="row"><span>🇶🇦 سعر الريال القطري (ريال)</span><input id="set-qar" type="number" step="0.01" inputmode="decimal"></div>
    <div class="row"><span>💳 رسوم الفرسان (٪)</span><input id="set-fee" type="number" step="0.1" inputmode="decimal"></div>
    <div class="row"><span>🧾 الضريبة على الرسوم (٪)</span><input id="set-vat" type="number" step="0.1" inputmode="decimal"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

  <div class="totalbar">
    <div>
      <div class="grand"><b id="grand">0</b> <small>ريال · <span id="mlabel"></span></small></div>
      <div class="sub"><b id="pieces">0</b> قطعة · الإجمالي الكلي <b id="grandall">0</b> ريال</div>
    </div>
    <button class="reset" onclick="resetSection()">تصفير القسم</button>
  </div>

  <div class="toast" id="toast">تم ✅</div>

<script>
  // ===== الطرق =====
  const METHODS = {
    usd:    { label: '💵 دولار',     hint: 'بالدولار',     cur: '$',    priceKey: 'priceUsd', rateKey: 'usdRate', fee: false },
    forsan: { label: '💳 الفرسان',   hint: 'دولار + رسوم', cur: '$',    priceKey: 'priceUsd', rateKey: 'usdRate', fee: true  },
    qatar:  { label: '🇶🇦 قطر',      hint: 'ريال قطري',    cur: 'ر.ق',  priceKey: 'priceQar', rateKey: 'qarRate', fee: false }
  };

  // ===== الإعدادات =====
  const defSettings = { usdRate: 3.75, qarRate: 1.03, feePct: 2, vatPct: 15 };
  let settings = Object.assign({}, defSettings, JSON.parse(localStorage.getItem('jard_settings') || '{}'));

  // ===== المنتجات (مع ترحيل من النسخة القديمة) =====
  function seed(){
    return [1400,3500,7000,10000,17500,50000,100000].map(v => ({
      name: 'عملة', value: v, priceUsd: (v===1400?14.42:0), priceQar: 0,
      counts: { usd:0, forsan:0, qatar:0 }
    }));
  }
  let products = JSON.parse(localStorage.getItem('jard_products_v3') || 'null');
  if(!products){
    const old = JSON.parse(localStorage.getItem('jard_products_v2') || 'null');
    if(old && old.length){
      products = old.map(p => ({ name:p.name, value:p.value, priceUsd:p.cost||0, priceQar:0,
        counts:{ usd:p.count||0, forsan:0, qatar:0 } }));
    } else products = seed();
  }

  let active = localStorage.getItem('jard_active') || 'usd';

  const grid = document.getElementById('grid');
  const tabsEl = document.getElementById('tabs');

  function fmt(n){ return (Math.round(n*100)/100).toLocaleString('en-US'); }
  function save(){ localStorage.setItem('jard_products_v3', JSON.stringify(products)); }
  function saveSettings(){ localStorage.setItem('jard_settings', JSON.stringify(settings)); }

  // تكلفة الحبة الواحدة بالريال حسب الطريقة + تفاصيل الرسوم
  function pieceCost(p, mKey){
    const m = METHODS[mKey];
    const price = p[m.priceKey] || 0;
    const rate = settings[m.rateKey] || 0;
    const base = price * rate;
    let extra = 0;
    if(m.fee){
      const fee = base * (settings.feePct/100);
      const vat = fee * (settings.vatPct/100);
      extra = fee + vat;
    }
    return { base, extra, total: base + extra };
  }

  // ===== التبويبات =====
  function renderTabs(){
    tabsEl.innerHTML = '';
    Object.keys(METHODS).forEach(k => {
      const m = METHODS[k];
      const b = document.createElement('button');
      b.className = 'tab' + (k===active ? ' active' : '');
      b.innerHTML = m.label + '<small>' + m.hint + '</small>';
      b.onclick = () => { active = k; localStorage.setItem('jard_active', k); render(); };
      tabsEl.appendChild(b);
    });
  }

  // ===== البطاقات =====
  function render(){
    renderTabs();
    const m = METHODS[active];
    document.getElementById('mlabel').textContent = m.label;
    grid.innerHTML = '';
    products.forEach((p, i) => {
      const c = (p.counts && p.counts[active]) || 0;
      const pc = pieceCost(p, active);
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => { p.counts[active] = c + 1; save(); render(); };
      card.innerHTML = `
        <button class="minus" onclick="event.stopPropagation(); dec(${i})">−</button>
        <button class="del" onclick="event.stopPropagation(); delProduct(${i})">🗑</button>

        <input class="name-input" value="${(p.name||'').replace(/"/g,'&quot;')}" placeholder="اسم المنتج"
               onclick="event.stopPropagation()" oninput="setField(${i},'name',this.value)">

        <div class="row2">
          <div class="field">
            <label>العملة</label>
            <input class="v" type="number" inputmode="numeric" value="${p.value||''}" placeholder="0"
                   onclick="event.stopPropagation()" oninput="setField(${i},'value',this.value)">
          </div>
          <div class="field">
            <label>السعر (${m.cur})</label>
            <input class="p" type="number" step="0.01" inputmode="decimal" value="${p[m.priceKey]||''}" placeholder="0"
                   onclick="event.stopPropagation()" oninput="setField(${i},'${m.priceKey}',this.value); refreshCard(${i})">
          </div>
        </div>

        <div class="sar-each">${cardCostText(p)}</div>

        <div class="count">العدد: ${c}</div>
        <div class="subtotal">${c && pc.total ? fmt(pc.total*c) + ' ريال' : ''}</div>
      `;
      grid.appendChild(card);
    });

    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.onclick = addProduct;
    addCard.innerHTML = `<div class="plus">＋</div><div>إضافة منتج</div>`;
    grid.appendChild(addCard);

    updateTotal();
  }

  function cardCostText(p){
    const pc = pieceCost(p, active);
    if(!pc.total) return '';
    let t = '= <b>' + fmt(pc.total) + '</b> ريال للحبة';
    if(METHODS[active].fee && pc.extra) t += ' <span class="fee-note">(رسوم ' + fmt(pc.extra) + ')</span>';
    return t;
  }

  function setField(i, key, v){
    products[i][key] = (key==='name') ? v : (parseFloat(v)||0);
    save(); updateTotal();
  }
  function refreshCard(i){
    const card = grid.children[i]; if(!card) return;
    const p = products[i];
    const c = (p.counts && p.counts[active]) || 0;
    const pc = pieceCost(p, active);
    card.querySelector('.sar-each').innerHTML = cardCostText(p);
    card.querySelector('.subtotal').textContent = (c && pc.total) ? fmt(pc.total*c) + ' ريال' : '';
  }

  function dec(i){ if(products[i].counts[active]>0) products[i].counts[active]--; save(); render(); }

  function addProduct(){
    products.push({ name:'منتج جديد', value:0, priceUsd:0, priceQar:0, counts:{usd:0,forsan:0,qatar:0} });
    save(); render();
    const names = grid.querySelectorAll('.name-input');
    const last = names[names.length-1];
    if(last){ last.focus(); last.select(); }
  }
  function delProduct(i){
    if(confirm('تبي تحذف «' + (products[i].name||'') + '»؟')){ products.splice(i,1); save(); render(); }
  }

  function updateTotal(){
    let secSar=0, secPieces=0, allSar=0;
    products.forEach(p => {
      Object.keys(METHODS).forEach(k => {
        const c = (p.counts && p.counts[k]) || 0;
        if(!c) return;
        const t = pieceCost(p, k).total * c;
        allSar += t;
        if(k===active){ secSar += t; secPieces += c; }
      });
    });
    document.getElementById('grand').textContent = fmt(secSar);
    document.getElementById('pieces').textContent = fmt(secPieces);
    document.getElementById('grandall').textContent = fmt(allSar);
  }

  function resetSection(){
    if(confirm('تصفير عدد قسم «' + METHODS[active].label + '» فقط؟')){
      products.forEach(p => p.counts[active] = 0); save(); render();
    }
  }

  // ===== الإعدادات =====
  function toggleSettings(){ document.getElementById('settings').classList.toggle('open'); }
  function bindSetting(id, key){
    const el = document.getElementById(id);
    el.value = settings[key];
    el.addEventListener('input', () => { settings[key] = parseFloat(el.value)||0; saveSettings(); render(); });
  }
  bindSetting('set-usd','usdRate'); bindSetting('set-qar','qarRate');
  bindSetting('set-fee','feePct'); bindSetting('set-vat','vatPct');

  // ===== التقرير =====
  function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

  function copyReport(){
    const now = new Date();
    const date = now.toLocaleDateString('ar-EG') + ' - ' + now.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
    let lines = ['🧮 جرد تيك توك', '📅 ' + date];
    let allSar=0, allPieces=0;
    Object.keys(METHODS).forEach(k => {
      const m = METHODS[k];
      let secSar=0, secPieces=0, rows=[];
      products.forEach(p => {
        const c = (p.counts && p.counts[k]) || 0;
        if(c<=0) return;
        const t = pieceCost(p,k).total * c;
        secSar += t; secPieces += c;
        rows.push(`▫️ ${p.name} (${fmt(p.value)}) × ${c} = ${fmt(t)} ريال`);
      });
      if(rows.length){
        lines.push('━━━━━━━━━━━', m.label);
        lines.push(...rows);
        lines.push(`↳ ${fmt(secPieces)} قطعة = ${fmt(secSar)} ريال`);
        allSar += secSar; allPieces += secPieces;
      }
    });
    lines.push('━━━━━━━━━━━');
    lines.push('🔢 إجمالي القطع: ' + fmt(allPieces));
    lines.push('💰 الإجمالي الكلي: ' + fmt(allSar) + ' ريال');
    const text = lines.join('\n');
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>toast('تم نسخ التقرير ✅')).catch(()=>fallbackCopy(text));
    } else fallbackCopy(text);
  }
  function fallbackCopy(text){
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('تم نسخ التقرير ✅'); }catch(e){ alert(text); }
    document.body.removeChild(ta);
  }

  render();
</script>
</body>
</html>
